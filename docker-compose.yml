version: '3.8'

services:

  app1:
    image: myhong00/nhatro:latest
    container_name: app1
    ports:
      - "8001:8000"
    volumes:
      - .:/app            # Mount code vào container
      - ./storage:/app/storage  # Đảm bảo logs và cache được giữ
      - ./public:/app/public    # Đảm bảo build Vite tồn tại
      - .env:/app/.env          # Mount file .env từ host
    depends_on:
      - db

  app2:
    image: myhong00/nhatro:latest
    container_name: app2
    ports:
      - "8002:8000"
    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./public:/app/public
      - .env:/app/.env
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2

  db:
    image: mysql:8
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nhatro
    ports:
      - "3309:3306"